<svg width="720" height="520" viewBox="0 0 720 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="720" height="520" rx="36" fill="#F7F5EA"/>

  <!-- ===== COLONNA 1: SCAFFALE FISICO ===== -->
  <rect x="54" y="60" width="178" height="290" rx="20" fill="#1A4A2E"/>
  <!-- Mensola 1 -->
  <rect x="70" y="100" width="146" height="6" rx="3" fill="#2C5B41"/>
  <!-- Prodotti mensola 1 -->
  <rect x="76" y="74" width="32" height="28" rx="8" fill="#BFD63A"/>
  <rect x="116" y="78" width="28" height="24" rx="7" fill="#F2AB48"/>
  <rect x="152" y="72" width="36" height="30" rx="8" fill="#E78452"/>
  <rect x="76" y="60" width="14" height="14" rx="4" fill="#FBFAF2" fill-opacity="0.5"/>
  <!-- Mensola 2 -->
  <rect x="70" y="170" width="146" height="6" rx="3" fill="#2C5B41"/>
  <!-- Prodotti mensola 2 -->
  <rect x="78" y="145" width="26" height="26" rx="7" fill="#E78452"/>
  <rect x="112" y="140" width="34" height="30" rx="8" fill="#FBFAF2"/>
  <rect x="154" y="143" width="28" height="28" rx="7" fill="#BFD63A"/>
  <!-- Mensola 3 -->
  <rect x="70" y="240" width="146" height="6" rx="3" fill="#2C5B41"/>
  <!-- Prodotti mensola 3 -->
  <rect x="78" y="216" width="30" height="26" rx="7" fill="#F2AB48"/>
  <rect x="116" y="212" width="26" height="30" rx="7" fill="#BFD63A"/>
  <rect x="150" y="218" width="32" height="24" rx="7" fill="#E78452"/>
  <!-- Mensola 4 (base) -->
  <rect x="70" y="308" width="146" height="6" rx="3" fill="#2C5B41"/>
  <!-- Prodotti mensola 4 -->
  <rect x="80" y="278" width="28" height="32" rx="8" fill="#FBFAF2"/>
  <rect x="116" y="282" width="24" height="28" rx="7" fill="#BFD63A"/>
  <rect x="148" y="278" width="32" height="32" rx="8" fill="#F2AB48"/>
  <!-- Label scaffale -->
  <rect x="54" y="362" width="178" height="34" rx="12" fill="#1A4A2E"/>
  <text x="143" y="383" fill="#BFD63A" font-size="14" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Scaffale fisico</text>

  <!-- ===== FRECCIA CENTRALE ===== -->
  <!-- Freccia 1: scaffale → smartphone -->
  <path d="M242 180 L282 180" stroke="#BFD63A" stroke-width="5" stroke-linecap="round"/>
  <path d="M274 170 L286 180 L274 190" stroke="#BFD63A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Freccia 2: smartphone → borsa -->
  <path d="M458 180 L498 180" stroke="#BFD63A" stroke-width="5" stroke-linecap="round"/>
  <path d="M490 170 L502 180 L490 190" stroke="#BFD63A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ===== COLONNA 2: SMARTPHONE / DIGITALE ===== -->
  <!-- Corpo smartphone -->
  <rect x="296" y="68" width="148" height="266" rx="22" fill="#FBFAF2" stroke="#1A4A2E" stroke-width="6"/>
  <!-- Schermo -->
  <rect x="310" y="92" width="120" height="200" rx="10" fill="#1A4A2E"/>
  <!-- QR code semplificato (3x3 grid) -->
  <rect x="326" y="108" width="22" height="22" rx="4" fill="#BFD63A"/>
  <rect x="354" y="108" width="22" height="22" rx="4" fill="#BFD63A"/>
  <rect x="382" y="108" width="22" height="22" rx="4" fill="#BFD63A"/>
  <rect x="326" y="136" width="22" height="22" rx="4" fill="#FBFAF2"/>
  <rect x="354" y="136" width="22" height="22" rx="4" fill="#BFD63A"/>
  <rect x="382" y="136" width="22" height="22" rx="4" fill="#FBFAF2"/>
  <rect x="326" y="164" width="22" height="22" rx="4" fill="#BFD63A"/>
  <rect x="354" y="164" width="22" height="22" rx="4" fill="#FBFAF2"/>
  <rect x="382" y="164" width="22" height="22" rx="4" fill="#BFD63A"/>
  <!-- Dati sotto QR -->
  <rect x="320" y="202" width="100" height="8" rx="4" fill="#BFD63A" fill-opacity="0.8"/>
  <rect x="320" y="218" width="80" height="6" rx="3" fill="#FBFAF2" fill-opacity="0.45"/>
  <rect x="320" y="232" width="90" height="6" rx="3" fill="#FBFAF2" fill-opacity="0.45"/>
  <!-- Pulsante home -->
  <circle cx="370" cy="318" r="10" fill="#2C5B41"/>
  <!-- Label digitale -->
  <rect x="296" y="346" width="148" height="34" rx="12" fill="#1A4A2E"/>
  <text x="370" y="367" fill="#BFD63A" font-size="14" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Integrazione digitale</text>

  <!-- ===== COLONNA 3: CLICK & COLLECT ===== -->
  <!-- Borsa shopping -->
  <rect x="516" y="100" width="160" height="156" rx="20" fill="#E78452"/>
  <!-- Manici borsa -->
  <path d="M554 100 C554 72 620 72 620 100" stroke="#C55A2A" stroke-width="10" stroke-linecap="round" fill="none"/>
  <!-- Logo TDA sulla borsa -->
  <circle cx="596" cy="166" r="30" fill="#FBFAF2" fill-opacity="0.25"/>
  <text x="596" y="158" fill="#FBFAF2" font-size="11" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Terra</text>
  <text x="596" y="173" fill="#FBFAF2" font-size="11" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">D'Amore</text>
  <!-- Badge "Pronti in 2h" -->
  <rect x="548" y="56" width="120" height="38" rx="19" fill="#BFD63A"/>
  <text x="608" y="79" fill="#1A4A2E" font-size="15" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Pronti in 2h</text>
  <!-- Label click & collect -->
  <rect x="516" y="270" width="160" height="34" rx="12" fill="#1A4A2E"/>
  <text x="596" y="291" fill="#F2AB48" font-size="14" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Click &amp; Collect</text>

  <!-- ===== DASHBOARD METRICHE (basso) ===== -->
  <rect x="54" y="418" width="622" height="78" rx="20" fill="#1A4A2E"/>
  <!-- Metrica 1 -->
  <text x="168" y="450" fill="#BFD63A" font-size="22" font-family="Georgia, serif" font-weight="700" text-anchor="middle">23</text>
  <text x="168" y="472" fill="#FBFAF2" font-size="13" font-family="Arial, sans-serif" text-anchor="middle">produttori</text>
  <!-- Separatore -->
  <rect x="294" y="434" width="2" height="46" rx="1" fill="#FBFAF2" fill-opacity="0.2"/>
  <!-- Metrica 2 -->
  <text x="370" y="450" fill="#F2AB48" font-size="22" font-family="Georgia, serif" font-weight="700" text-anchor="middle">1.200+</text>
  <text x="370" y="472" fill="#FBFAF2" font-size="13" font-family="Arial, sans-serif" text-anchor="middle">prodotti</text>
  <!-- Separatore -->
  <rect x="446" y="434" width="2" height="46" rx="1" fill="#FBFAF2" fill-opacity="0.2"/>
  <!-- Metrica 3 -->
  <text x="558" y="450" fill="#BFD63A" font-size="16" font-family="Georgia, serif" font-weight="700" text-anchor="middle">Dati in tempo reale</text>
  <circle cx="530" cy="445" r="6" fill="#BFD63A"/>
  <text x="558" y="472" fill="#FBFAF2" font-size="13" font-family="Arial, sans-serif" text-anchor="middle">dal campo allo scaffale</text>
</svg>
