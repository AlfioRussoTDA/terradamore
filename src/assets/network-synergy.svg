<svg width="720" height="520" viewBox="0 0 720 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="720" height="520" rx="36" fill="#F7F5EA"/>

  <!-- Badge in alto -->
  <rect x="238" y="22" width="244" height="44" rx="22" fill="#1A4A2E"/>
  <text x="360" y="49" fill="#BFD63A" font-size="18" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">100+ voci · 1 rete</text>

  <!-- ===== LINEE DI CONNESSIONE ===== -->
  <!-- Hub → Produttore 1 (alto-sinistra) -->
  <line x1="308" y1="270" x2="174" y2="162" stroke="#BFD63A" stroke-width="4" stroke-linecap="round"/>
  <!-- Hub → Produttore 2 (alto-destra) -->
  <line x1="412" y1="270" x2="544" y2="162" stroke="#BFD63A" stroke-width="4" stroke-linecap="round"/>
  <!-- Hub → Hub fisico (alto-centro) -->
  <line x1="360" y1="254" x2="360" y2="150" stroke="#F2AB48" stroke-width="4" stroke-linecap="round"/>
  <!-- Hub → Partner 1 (basso-sinistra) -->
  <line x1="308" y1="306" x2="150" y2="390" stroke="#FBFAF2" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 5"/>
  <!-- Hub → Partner 2 (basso-destra) -->
  <line x1="412" y1="306" x2="570" y2="390" stroke="#FBFAF2" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 5"/>

  <!-- Label sulle linee -->
  <rect x="82" y="196" width="76" height="22" rx="11" fill="#BFD63A"/>
  <text x="120" y="211" fill="#1A4A2E" font-size="11" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">logistica</text>

  <rect x="562" y="196" width="60" height="22" rx="11" fill="#BFD63A"/>
  <text x="592" y="211" fill="#1A4A2E" font-size="11" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">dati</text>

  <rect x="320" y="176" width="80" height="22" rx="11" fill="#F2AB48"/>
  <text x="360" y="191" fill="#1A4A2E" font-size="11" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">tecnologia</text>

  <rect x="82" y="366" width="100" height="22" rx="11" fill="#FBFAF2" stroke="#1A4A2E" stroke-width="1.5"/>
  <text x="132" y="381" fill="#1A4A2E" font-size="11" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">reputazione</text>

  <rect x="540" y="366" width="90" height="22" rx="11" fill="#FBFAF2" stroke="#1A4A2E" stroke-width="1.5"/>
  <text x="585" y="381" fill="#1A4A2E" font-size="11" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">visibilità</text>

  <!-- ===== NODO CENTRALE: TERRA D'AMORE HUB ===== -->
  <circle cx="360" cy="280" r="72" fill="#1A4A2E"/>
  <circle cx="360" cy="280" r="60" fill="#1A4A2E" stroke="#BFD63A" stroke-width="4"/>
  <!-- Icona foglia stilizzata al centro -->
  <path d="M360 252 C340 262 334 278 344 294 C352 306 368 308 378 298 C390 286 388 268 360 252Z" fill="#BFD63A"/>
  <path d="M360 252 L360 300" stroke="#1A4A2E" stroke-width="3" stroke-linecap="round"/>
  <text x="360" y="322" fill="#FBFAF2" font-size="13" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Terra D'Amore</text>
  <text x="360" y="338" fill="#BFD63A" font-size="12" font-family="Arial, sans-serif" text-anchor="middle">hub centrale</text>

  <!-- ===== NODO: PRODUTTORE 1 (alto-sinistra) ===== -->
  <circle cx="150" cy="134" r="52" fill="#BFD63A"/>
  <!-- Icona pianta -->
  <path d="M150 110 C136 118 130 130 138 142 C144 150 156 152 162 144 C170 134 166 120 150 110Z" fill="#1A4A2E"/>
  <path d="M150 110 L150 148" stroke="#1A4A2E" stroke-width="3" stroke-linecap="round"/>
  <text x="150" y="162" fill="#1A4A2E" font-size="13" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Produttore</text>

  <!-- ===== NODO: PRODUTTORE 2 (alto-destra) ===== -->
  <circle cx="570" cy="134" r="52" fill="#BFD63A"/>
  <!-- Icona pianta -->
  <path d="M570 110 C556 118 550 130 558 142 C564 150 576 152 582 144 C590 134 586 120 570 110Z" fill="#1A4A2E"/>
  <path d="M570 110 L570 148" stroke="#1A4A2E" stroke-width="3" stroke-linecap="round"/>
  <text x="570" y="162" fill="#1A4A2E" font-size="13" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Produttore</text>

  <!-- ===== NODO: HUB FISICO (alto-centro) ===== -->
  <rect x="310" y="72" width="100" height="70" rx="18" fill="#F2AB48"/>
  <!-- Icona edificio/location pin -->
  <path d="M360 84 C348 84 340 92 340 102 C340 116 360 128 360 128 C360 128 380 116 380 102 C380 92 372 84 360 84Z" fill="#1A4A2E"/>
  <circle cx="360" cy="102" r="7" fill="#F2AB48"/>
  <text x="360" y="156" fill="#1A4A2E" font-size="13" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Hub fisico</text>

  <!-- ===== NODO: PARTNER 1 (basso-sinistra) ===== -->
  <circle cx="126" cy="412" r="52" fill="#FBFAF2" stroke="#1A4A2E" stroke-width="5"/>
  <!-- Icona negozio -->
  <rect x="106" y="398" width="40" height="28" rx="5" fill="#1A4A2E"/>
  <rect x="112" y="404" width="12" height="22" rx="3" fill="#BFD63A"/>
  <rect x="130" y="404" width="10" height="10" rx="2" fill="#F7F5EA"/>
  <path d="M102 398 L150 398 L146 386 C143 380 109 380 106 386Z" fill="#1A4A2E"/>
  <text x="126" y="440" fill="#1A4A2E" font-size="13" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Partner</text>

  <!-- ===== NODO: PARTNER 2 (basso-destra) ===== -->
  <circle cx="594" cy="412" r="52" fill="#FBFAF2" stroke="#1A4A2E" stroke-width="5"/>
  <!-- Icona negozio -->
  <rect x="574" y="398" width="40" height="28" rx="5" fill="#1A4A2E"/>
  <rect x="580" y="404" width="12" height="22" rx="3" fill="#BFD63A"/>
  <rect x="598" y="404" width="10" height="10" rx="2" fill="#F7F5EA"/>
  <path d="M570 398 L618 398 L614 386 C611 380 577 380 574 386Z" fill="#1A4A2E"/>
  <text x="594" y="440" fill="#1A4A2E" font-size="13" font-family="Arial, sans-serif" font-weight="700" text-anchor="middle">Partner</text>

  <!-- Didascalia basso -->
  <text x="360" y="488" fill="#1A4A2E" font-size="14" font-family="Georgia, serif" font-style="italic" text-anchor="middle">Tecnologia, logistica e reputazione condivisa</text>
</svg>
